<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Quản lý tài khoản — TLUTRUYEN">
  <title>Quản lý tài khoản — TLUTRUYEN</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="../../css/style.css" rel="stylesheet">
</head>
<body>

  <main class="container py-4" id="admin-account-content">

    <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
      <h2 class="cw-section__title anim-fade-in mb-0">
        <i class="bi bi-people-fill"></i> Quản lý tài khoản
      </h2>

      <button class="btn btn-cw-outline btn-sm" onclick="window.location.href='dashboard.html'">
        <i class="bi bi-arrow-left"></i>
        Quay lại Dashboard
      </button>
    </div>

    <!-- Thống kê tài khoản -->
    <div class="row g-3 mb-4" id="account-stats">
      <div class="col-12 text-center py-3">
        <div class="spinner-border text-danger" role="status"></div>
      </div>
    </div>

    <!-- Form thêm / sửa tài khoản -->
    <section class="cw-admin-panel mb-4">
      <div class="cw-admin-panel__header">
        <h3 class="cw-admin-title mb-0" id="account-form-title">
          <i class="bi bi-person-plus-fill"></i> Thêm mới tài khoản
        </h3>
      </div>

      <form class="row g-3" id="account-form">
        <input type="hidden" id="account-id">

        <div class="col-12 col-md-6">
          <label class="cw-form-label" for="fullname">Họ tên</label>
          <input class="cw-form-input" type="text" id="fullname" placeholder="Nhập họ tên" required>
        </div>

        <div class="col-12 col-md-6">
          <label class="cw-form-label" for="username">Tên đăng nhập</label>
          <input class="cw-form-input" type="text" id="username" placeholder="Nhập tên đăng nhập">
        </div>

        <div class="col-12 col-md-6">
          <label class="cw-form-label" for="email">Email</label>
          <input class="cw-form-input" type="email" id="email" placeholder="Nhập email" required>
        </div>

        <div class="col-12 col-md-6">
          <label class="cw-form-label" for="password">Mật khẩu</label>
          <input class="cw-form-input" type="password" id="password" placeholder="Nhập mật khẩu khi thêm mới">
        </div>

        <div class="col-12 col-md-3">
          <label class="cw-form-label" for="role">Vai trò</label>
          <select class="cw-form-input" id="role">
            <option value="user">Người dùng</option>
            <option value="admin">Admin</option>
          </select>
        </div>

        <div class="col-12 col-md-3">
          <label class="cw-form-label" for="status">Trạng thái</label>
          <select class="cw-form-input" id="status">
            <option value="active">Đang hoạt động</option>
            <option value="locked">Tạm khóa</option>
          </select>
        </div>

        <div class="col-12">
          <button type="submit" class="btn btn-cw-primary btn-sm" id="btn-save-account">
            <i class="bi bi-save"></i>
            Lưu tài khoản
          </button>

          <button type="button" class="btn btn-cw-outline btn-sm ms-2" id="btn-reset-account">
            <i class="bi bi-arrow-clockwise"></i>
            Làm mới
          </button>
        </div>
      </form>
    </section>

    <!-- Danh sách tài khoản -->
    <section class="cw-admin-panel">
      <div class="cw-admin-panel__header">
        <h3 class="cw-admin-title mb-0">
          <i class="bi bi-list-ul"></i> Danh sách tài khoản
        </h3>

        <div class="cw-admin-search">
          <i class="bi bi-search"></i>
          <input type="text" id="account-search" placeholder="Tìm tài khoản...">
        </div>
      </div>

      <div class="table-responsive" id="account-list">
        <div class="text-center py-3">
          <div class="spinner-border text-danger" role="status"></div>
        </div>
      </div>
    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/config.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/api.js"></script>
  <script src="../../js/components.js"></script>
  <script src="../../js/accounts.js"></script>
</body>
</html>
