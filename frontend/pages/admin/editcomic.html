<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
 
  <title>Sửa truyện — TLUTRUYEN</title>
 
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="../../css/style.css" rel="stylesheet">
</head>
 
<body>
 
  <div id="navbar"></div>
 
  <main class="container py-4">
 
    <h2 class="cw-section__title mb-4">
      <i class="bi bi-pencil-square"></i>
      Sửa thông tin truyện
    </h2>
 
    <section class="cw-add-comic-card">
 
      <form id="edit-comic-form">
 
        <div class="row g-4">
 
          <!-- ID truyện -->
          <div class="col-md-6">
            <label class="cw-form-label" for="comic-id">ID truyện</label>
 
            <div class="cw-auto-id-box">
              <div>
                <span class="cw-auto-id-box__title">
                  <i class="bi bi-hash"></i>
                  ID hiện tại
                </span>
 
                <input
                  type="number"
                  id="comic-id"
                  class="cw-auto-id-input"
                  readonly>
              </div>
            </div>
          </div>
 
          <!-- Tên truyện -->
          <div class="col-md-6">
            <label class="cw-form-label" for="comic-title">Tên truyện</label>
 
            <input
              type="text"
              class="cw-form-input"
              id="comic-title"
              placeholder="Nhập tên truyện">
          </div>
 
          <!-- Tác giả -->
          <div class="col-md-6">
            <label class="cw-form-label" for="comic-author">Tác giả</label>
 
            <input
              type="text"
              class="cw-form-input"
              id="comic-author"
              placeholder="Nhập tên tác giả">
          </div>
 
          <!-- Artist -->
          <div class="col-md-6">
            <label class="cw-form-label" for="comic-artist">Artist</label>
 
            <input
              type="text"
              class="cw-form-input"
              id="comic-artist"
              placeholder="Nhập tên artist">
          </div>
 
          <!-- Ảnh bìa hiện tại -->
          <div class="col-md-6">
            <label class="cw-form-label">Ảnh bìa hiện tại</label>
 
            <div class="cw-cover-preview">
              <img
                id="comic-cover-preview"
                src="../../assets/images/default-cover.jpg"
                alt="Ảnh bìa truyện">
 
              <div class="cw-cover-preview__info">
                <span>Ảnh bìa truyện</span>
                <small>Có thể upload ảnh mới bên dưới</small>
              </div>
            </div>
          </div>
 
          <!-- Upload ảnh bìa -->
          <div class="col-md-6">
            <label class="cw-form-label" for="comic-cover">Upload ảnh bìa mới</label>
 
            <label class="cw-upload-box" for="comic-cover">
              <i class="bi bi-image"></i>
              <span>Chọn ảnh bìa mới</span>
              <small>PNG, JPG, WEBP</small>
            </label>
 
            <input
              type="file"
              id="comic-cover"
              class="cw-upload-input"
              accept="image/*">
          </div>

          <!-- Cover image preview -->
          <div id="cover-preview-container" class="col-md-6 mt-3 d-none">
            <div class="upload-preview-wrapper">
              <div class="upload-preview-item position-relative">
                <img id="cover-preview-new-img" src="" alt="Preview ảnh bìa" class="upload-preview-img">
                <div class="upload-preview-info">
                  <span id="cover-preview-new-name" class="upload-preview-filename"></span>
                  <small id="cover-preview-new-size" class="text-muted d-block"></small>
                  <small id="cover-preview-new-dims" class="text-muted d-block"></small>
                  <button type="button" class="btn btn-sm btn-outline-danger mt-2" onclick="removeCoverPreview()" style="cursor: pointer;">
                    <i class="bi bi-trash"></i> Xóa
                  </button>
                </div>
              </div>
            </div>
          </div>

          <!-- Mô tả -->
          <div class="col-md-12">
            <label class="cw-form-label" for="comic-description">Mô tả</label>
 
            <textarea
              class="cw-form-input cw-form-textarea"
              id="comic-description"
              rows="6"
              placeholder="Nhập mô tả nội dung truyện"></textarea>
          </div>
 
          <!-- Thể loại -->
          <div class="col-md-12">
            <label class="cw-form-label" for="comic-genres">
              Thể loại
            </label>
 
            <input
              type="text"
              class="cw-form-input"
              id="comic-genres"
              placeholder="Action, Fantasy, Adventure">
          </div>
 
        </div>
 
        <div class="d-flex flex-wrap gap-3 mt-4">
 
          <button type="submit" class="btn btn-cw-primary" id="btn-save-comic">
            <i class="bi bi-check-lg"></i>
            Lưu thay đổi
          </button>
 
          <a href="dashboard.html" class="btn btn-cw-outline">
            <i class="bi bi-arrow-left"></i>
            Quay lại
          </a>
 
        </div>
 
      </form>
 
    </section>

  <!-- ═══════════════════════════════════════════════
       CHAPTER MANAGER
  ═══════════════════════════════════════════════ -->
  <section class="cw-add-comic-card mt-4" id="chapter-manager">

    <div class="d-flex align-items-center justify-content-between mb-3">
      <h5 class="mb-0 fw-bold">
        <i class="bi bi-list-ol me-2 text-primary"></i>
        Quản lý chương (Chapters)
      </h5>
      <button type="button" class="btn btn-cw-primary btn-sm" id="btn-show-add-chapter">
        <i class="bi bi-plus-lg me-1"></i>Thêm chương mới
      </button>
    </div>

    <!-- Bảng danh sách chương -->
    <div class="table-responsive mb-4">
      <table class="table table-light table-hover align-middle mb-0" id="chapters-table">
        <thead>
            <tr>
            <th class="th-stt">STT</th>
            <th>Tên chương</th>
            <th class="th-pages text-center">Số trang</th>
            <th class="th-small text-center">
              <i class="bi bi-coin me-1 text-warning"></i>Giá (xu)
            </th>
            <th class="th-action text-center">Hành động</th>
          </tr>
        </thead>
        <tbody id="chapters-tbody">
          <tr id="chapters-empty-row">
            <td colspan="5" class="text-center text-muted py-4">
              <i class="bi bi-inbox fs-3 d-block mb-2 opacity-50"></i>
              Chưa có chương nào
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Form Thêm / Sửa chương -->
    <div id="chapter-form-wrap" class="d-none">
      <hr class="border-secondary mb-4">

      <h6 class="fw-bold mb-3" id="chapter-form-title">
        <i class="bi bi-plus-circle me-2 text-success"></i>Thêm chương mới
      </h6>

      <div class="row g-3">

        <!-- Số thứ tự chương -->
        <div class="col-md-3">
          <label class="cw-form-label" for="ch-number">Số thứ tự chương</label>
          <input type="number" class="cw-form-input" id="ch-number" min="1" placeholder="Ví dụ: 1">
        </div>

        <!-- Tên chương -->
        <div class="col-md-5">
          <label class="cw-form-label" for="ch-title">Tên chương</label>
          <input type="text" class="cw-form-input" id="ch-title" placeholder="Ví dụ: Chương 1: Khởi đầu">
        </div>

        <!-- Giá xu -->
        <div class="col-md-4">
          <label class="cw-form-label" for="ch-price">
            <i class="bi bi-coin me-1 text-warning"></i>Giá đọc (Xu) — nhập 0 nếu miễn phí
          </label>
          <input type="number" class="cw-form-input" id="ch-price" min="0" value="0" placeholder="0">
        </div>

        <!-- Upload trang truyện -->
        <div class="col-md-12">
          <label class="cw-form-label" for="ch-pages">Trang truyện (ảnh)</label>

          <label class="cw-upload-box cw-upload-box--wide" for="ch-pages" id="ch-pages-box">
            <i class="bi bi-images"></i>
            <span>Kéo thả hoặc nhấn để chọn ảnh trang truyện</span>
            <small>PNG, JPG, WEBP — có thể chọn nhiều file</small>
          </label>

          <input type="file" id="ch-pages" class="cw-upload-input" multiple accept="image/*">

          <!-- Chapter pages preview -->
          <div id="ch-pages-preview-container" class="d-none mt-3">
            <div class="d-flex align-items-center mb-3">
              <strong>Đã chọn <span id="ch-pages-count">0</span> trang truyện:</strong>
              <button type="button" class="btn btn-sm btn-outline-secondary ms-auto" onclick="clearChapterPagesPreview()">
                <i class="bi bi-trash"></i> Xóa tất cả
              </button>
            </div>
            <div id="ch-pages-grid" class="upload-preview-grid"></div>
          </div>

          <!-- Preview thumbnails -->
          <div id="ch-pages-preview" class="d-flex flex-wrap gap-2 mt-2 hidden-important"></div>
        </div>

      </div>

      <!-- Hidden: editing chapter id -->
      <input type="hidden" id="ch-editing-id" value="">

      <div class="d-flex gap-2 mt-3">
        <button type="button" class="btn btn-cw-primary" id="btn-save-chapter">
          <i class="bi bi-check-lg me-1"></i>
          <span id="btn-save-chapter-text">Thêm chương</span>
        </button>
        <button type="button" class="btn btn-cw-outline" id="btn-cancel-chapter">
          <i class="bi bi-x-lg me-1"></i>Hủy
        </button>
      </div>

    </div><!-- /chapter-form-wrap -->

  </section>

  </main>
 
  <div id="footer"></div>
 
  <script src="../../js/config.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/api.js"></script>
  <script src="../../js/components.js"></script>
  <script src="../../js/editcomic.js"></script>
 
</body>
</html>
