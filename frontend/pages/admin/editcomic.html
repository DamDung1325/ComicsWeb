<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Sửa truyện — ComicsWeb</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Bootstrap Icons -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />

  <!-- CSS -->
  <link rel="stylesheet" href="../../css/style.css" />
</head>

<body>

  <!-- Navbar -->
  <div id="navbar"></div>

  <main class="container py-5">

    <!-- Tiêu đề -->
    <div class="d-flex align-items-center mb-4">
      <div
        style="
          width: 5px;
          height: 45px;
          background: #ff1e1e;
          margin-right: 15px;
          border-radius: 10px;
        "
      ></div>

      <h1
        style="
          color: white;
          font-weight: 800;
          text-transform: uppercase;
          margin: 0;
        "
      >
        <i class="bi bi-pencil-square"></i>
        SỬA THÔNG TIN TRUYỆN
      </h1>
    </div>

    <!-- Form -->
    <div
      class="p-4 p-lg-5 rounded-4"
      style="
        background: #111;
        border: 1px solid rgba(255,255,255,0.08);
      "
    >

      <form id="edit-comic-form">

        <div class="row">

          <!-- ID -->
          <div class="col-md-6 mb-4">
            <label
              class="form-label fw-bold"
              style="color: white;"
            >
              ID
            </label>

            <input
              type="number"
              id="comic-id"
              class="form-control"
             
              style="
                background: #1b1f26;
                color: white;
                border: 1px solid #444;
                height: 50px;
              "
            />
          </div>

          <!-- Tên truyện -->
          <div class="col-md-6 mb-4">
            <label
              class="form-label fw-bold"
              style="color: white;"
            >
              Tên truyện
            </label>

            <input
              type="text"
              id="comic-title"
              class="form-control"
              required
              style="
                background: #1b1f26;
                color: white;
                border: 1px solid #444;
                height: 50px;
              "
            />
          </div>

          <!-- Tác giả -->
          <div class="col-md-6 mb-4">
            <label
              class="form-label fw-bold"
              style="color: white;"
            >
              Tác giả
            </label>

            <input
              type="text"
              id="comic-author"
              class="form-control"
              required
              style="
                background: #1b1f26;
                color: white;
                border: 1px solid #444;
                height: 50px;
              "
            />
          </div>

          <!-- Artist -->
          <div class="col-md-6 mb-4">
            <label
              class="form-label fw-bold"
              style="color: white;"
            >
              Artist
            </label>

            <input
              type="text"
              id="comic-artist"
              class="form-control"
              required
              style="
                background: #1b1f26;
                color: white;
                border: 1px solid #444;
                height: 50px;
              "
            />
          </div>

          <!-- Mô tả -->
          <div class="col-12 mb-4">
            <label
              class="form-label fw-bold"
              style="color: white;"
            >
              Mô tả
            </label>

            <textarea
              id="comic-description"
              rows="7"
              class="form-control"
              style="
                background: #1b1f26;
                color: white;
                border: 1px solid #444;
              "
            ></textarea>
          </div>

          <!-- Thể loại -->
          <div class="col-12 mb-4">
            <label
              class="form-label fw-bold"
              style="color: white;"
            >
              Thể loại (cách nhau bởi dấu phẩy)
            </label>

            <input
              type="text"
              id="comic-genres"
              class="form-control"
              style="
                background: #1b1f26;
                color: white;
                border: 1px solid #444;
                height: 50px;
              "
            />
          </div>

        </div>

        <!-- Buttons -->
        <div class="d-flex gap-3 mt-2">

          <!-- Lưu -->
          <button
            type="submit"
            class="btn"
            style="
              background: #ff1e1e;
              color: white;
              font-weight: 700;
              padding: 14px 30px;
              border-radius: 14px;
              border: none;
            "
          >
            <i class="bi bi-check-lg"></i>
            LƯU THAY ĐỔI
          </button>

          <!-- Quay lại -->
          <a
            href="dashboard.html"
            class="btn"
            style="
              background: transparent;
              color: white;
              border: 1px solid white;
              padding: 14px 28px;
              border-radius: 14px;
              font-weight: 600;
            "
          >
            Quay lại
          </a>

        </div>

      </form>

    </div>

  </main>

  <!-- Footer -->
  <div id="footer"></div>

  <!-- JS -->
  <script src="../../js/config.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/api.js"></script>
  <script src="../../js/components.js"></script>
  <script src="../../js/editcomic.js"></script>

  <!-- Bootstrap -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
