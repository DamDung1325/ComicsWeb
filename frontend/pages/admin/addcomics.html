<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thêm truyện mới — ComicsWeb</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="../../css/style.css" rel="stylesheet">
</head>

<body>

<main class="container py-4">

  <h2 class="cw-section__title mb-4">
    <i class="bi bi-plus-circle"></i>
    Thêm truyện mới
  </h2>

  <div class="card p-4"
       style="
         background: var(--bg-surface);
         border:1px solid var(--border-color);
         border-radius:16px;
       ">

    <form id="add-comic-form">

      <div class="row">

        <div class="col-md-6 mb-3">
          <label class="form-label text-light">ID</label>
          <input type="number" class="form-control bg-dark text-light border-secondary" id="comic-id" required>
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label text-light">Tên truyện</label>
          <input type="text" class="form-control bg-dark text-light border-secondary" id="comic-title" required>
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label text-light">Tác giả</label>
          <input type="text" class="form-control bg-dark text-light border-secondary" id="comic-author" required>
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label text-light">Artist</label>
          <input type="text" class="form-control bg-dark text-light border-secondary" id="comic-artist" required>
        </div>

        <div class="col-md-12 mb-3">
          <label class="form-label text-light">Mô tả</label>
          <textarea
            class="form-control bg-dark text-light border-secondary"
            rows="5"
            id="comic-description"
            required></textarea>
        </div>

        <div class="col-md-12 mb-3">
          <label class="form-label text-light">
            Thể loại (cách nhau bởi dấu phẩy)
          </label>

          <input
            type="text"
            class="form-control bg-dark text-light border-secondary"
            id="comic-genres"
            placeholder="action, fantasy, adventure">
        </div>

      </div>

      <div class="d-flex gap-3 mt-3">

        <button type="submit" class="btn btn-cw-primary">
          <i class="bi bi-check-lg"></i>
          Thêm truyện
        </button>

        <a href="dashboard.html" class="btn btn-outline-light">
          Quay lại
        </a>

      </div>

    </form>

  </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="../../js/config.js"></script>
<script src="../../js/auth.js"></script>
<script src="../../js/utils.js"></script>
<script src="../../js/api.js"></script>

<script src="../../js/addcomics.js"></script>

</body>
</html>
